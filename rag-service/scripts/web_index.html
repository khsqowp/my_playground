<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Sandbox RAG</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/packages/pretendard/dist/web/static/pretendard.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --blue: #3182f6;
        --blue-press: #1b64da;
        --bg: #f2f4f6;
        --white: #ffffff;
        --label1: #191f28;
        --label2: #4e5968;
        --label3: #8b95a1;
        --label4: #adb5bd;
        --line1: #e5e8eb;
        --fill1: #f2f4f6;
        --fill2: #e5e8eb;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--label1);
        font-family: "Pretendard Variable", Pretendard, -apple-system,
          BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* ── App bar ── */
      .appbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--white);
        border-bottom: 1px solid var(--line1);
      }
      .appbar-inner {
        max-width: 1160px;
        margin: 0 auto;
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .appbar-title {
        font-size: 17px;
        font-weight: 700;
        color: var(--label1);
        margin: 0;
      }
      .status-chip {
        display: inline-flex;
        align-items: center;
        background: var(--fill1);
        border-radius: 100px;
        padding: 5px 12px;
        font-size: 12px;
        font-weight: 500;
        color: var(--label2);
        white-space: nowrap;
      }

      /* ── Layout ── */
      .page {
        max-width: 1160px;
        margin: 0 auto;
        padding: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 16px;
        align-items: start;
      }

      /* ── Card ── */
      .card {
        background: var(--white);
        border-radius: 16px;
        overflow: hidden;
      }

      /* ── Composer ── */
      .composer {
        padding: 20px;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--label3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      /* ── Project chips ── */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        border-radius: 100px;
        border: 1.5px solid var(--line1);
        background: var(--white);
        color: var(--label2);
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s, color 0.1s;
      }
      .chip:hover { background: var(--fill1); }
      .chip.active {
        background: var(--blue);
        border-color: var(--blue);
        color: var(--white);
      }

      /* ── Textarea ── */
      .textarea-wrap {
        background: var(--fill1);
        border-radius: 12px;
      }
      textarea {
        display: block;
        width: 100%;
        min-height: 96px;
        resize: vertical;
        border: 0;
        background: transparent;
        padding: 14px;
        font: inherit;
        font-size: 15px;
        color: var(--label1);
        line-height: 1.6;
        outline: none;
      }
      textarea::placeholder { color: var(--label4); }

      /* ── Action buttons ── */
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 18px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.1s;
      }
      .btn-primary { background: var(--blue); color: var(--white); }
      .btn-primary:hover { background: var(--blue-press); }
      .btn-secondary { background: var(--fill1); color: var(--label2); }
      .btn-secondary:hover { background: var(--fill2); }
      .btn:disabled { opacity: 0.55; cursor: wait; }

      /* ── Answer ── */
      .answer-wrap {
        padding: 20px;
        min-height: 200px;
        line-height: 1.7;
      }
      .answer-placeholder { color: var(--label4); font-size: 14px; }
      .answer h1, .answer h2, .answer h3 { margin: 0.75em 0 0.35em; line-height: 1.35; }
      .answer h1 { font-size: 1.1em; font-weight: 700; }
      .answer h2 { font-size: 1.05em; font-weight: 700; }
      .answer h3 { font-size: 1em; font-weight: 600; }
      .answer p { margin: 0 0 0.6em; }
      .answer p:last-child { margin-bottom: 0; }
      .answer ul, .answer ol { margin: 0 0 0.6em; padding-left: 1.4em; }
      .answer li { margin-bottom: 0.25em; }
      .answer code {
        background: var(--fill1);
        border-radius: 4px;
        padding: 0.1em 0.35em;
        font-size: 0.88em;
      }
      .answer pre {
        background: var(--fill1);
        border-radius: 10px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 0 0 0.6em;
      }
      .answer pre code { background: none; padding: 0; }
      .answer blockquote {
        border-left: 3px solid var(--line1);
        margin: 0 0 0.6em;
        padding-left: 1em;
        color: var(--label3);
      }
      .answer strong { font-weight: 700; }

      /* ── Sidebar ── */
      .sidebar-head {
        padding: 16px 20px 14px;
        font-size: 14px;
        font-weight: 700;
        color: var(--label1);
      }
      .sidebar-divider {
        height: 1px;
        background: var(--line1);
        margin: 0 20px;
      }
      .context-list {
        padding: 4px 20px 20px;
      }
      .ctx-item {
        padding: 14px 0;
        border-top: 1px solid var(--line1);
        font-size: 13px;
        line-height: 1.5;
      }
      .ctx-item:first-child { border-top: 0; }
      .ctx-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-weight: 700;
        font-size: 12px;
        color: var(--blue);
      }
      .ctx-source {
        margin-top: 3px;
        color: var(--label3);
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .ctx-text {
        margin-top: 6px;
        color: var(--label2);
      }
      .ctx-empty {
        padding: 16px 0;
        color: var(--label4);
        font-size: 13px;
      }

      /* ── Error ── */
      .error { color: #e53e3e; }

      /* ── Reindex progress ── */
      .reindex-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .reindex-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
        color: var(--label1);
      }
      .reindex-sub {
        font-size: 13px;
        color: var(--label3);
        font-weight: 400;
      }
      .progress-track {
        height: 6px;
        background: var(--fill2);
        border-radius: 100px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 100px;
        background: var(--blue);
        transition: width 0.3s ease;
      }
      .progress-fill.error { background: #e53e3e; }
      .reindex-files {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rfile {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 13px;
        line-height: 1.4;
      }
      .rfile-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
      .rfile-name { color: var(--label2); word-break: break-all; }
      .rfile-name.active { color: var(--label1); font-weight: 600; }
      .rfile-name.done { color: var(--label3); }
      .rfile-badge {
        margin-left: auto;
        flex-shrink: 0;
        font-size: 11px;
        color: var(--label4);
        padding-left: 8px;
      }
      .rfile-error {
        font-size: 12px;
        color: #e53e3e;
        margin-top: 2px;
      }

      /* ── File browser ── */
      .file-card {
        margin-top: 16px;
        padding: 20px;
      }
      .file-toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-bottom: 12px;
      }
      .file-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 8px;
      }
      .input {
        width: 100%;
        border: 1px solid var(--line1);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        font-size: 14px;
        color: var(--label1);
        outline: none;
      }
      .input:focus { border-color: var(--blue); }
      .file-path {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        margin-bottom: 8px;
        color: var(--label3);
        font-size: 12px;
      }
      .file-up {
        border: 0;
        background: var(--fill1);
        color: var(--label2);
        border-radius: 8px;
        padding: 5px 9px;
        cursor: pointer;
      }
      .file-up:disabled { opacity: 0.45; cursor: default; }
      .file-list {
        border-top: 1px solid var(--line1);
        max-height: 260px;
        overflow: auto;
      }
      .file-row {
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 42px;
        border-bottom: 1px solid var(--line1);
        color: var(--label2);
        font-size: 13px;
      }
      .file-row button {
        min-width: 0;
        border: 0;
        background: none;
        color: inherit;
        text-align: left;
        font: inherit;
        cursor: pointer;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0;
      }
      .file-row.unsupported { color: var(--label4); }
      .file-meta {
        color: var(--label4);
        font-size: 12px;
        white-space: nowrap;
      }
      .file-empty {
        padding: 14px 0;
        color: var(--label4);
        font-size: 13px;
      }

      /* ── Cache banner ── */
      .cache-banner {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--fill1);
        border-bottom: 1px solid var(--line1);
        font-size: 12px;
        color: var(--label3);
      }
      .cache-banner strong { color: var(--label2); font-weight: 600; }
      .cache-refresh {
        margin-left: auto;
        background: none;
        border: none;
        font: inherit;
        font-size: 12px;
        color: var(--blue);
        cursor: pointer;
        padding: 0;
      }
      .cache-refresh:hover { text-decoration: underline; }

      /* ── Web search toggle ── */
      .web-search-label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--label2);
        cursor: pointer;
        user-select: none;
        margin-right: auto;
      }
      .web-search-label input { cursor: pointer; accent-color: var(--blue); }
      .web-search-label.active { color: var(--blue); font-weight: 600; }

      /* ── Web sources ── */
      .web-sources {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--line1);
      }
      .web-sources-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .06em;
        text-transform: uppercase;
        color: var(--label4);
        margin-bottom: 8px;
      }
      .web-source {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .web-source a {
        color: var(--blue);
        text-decoration: none;
        word-break: break-all;
      }
      .web-source a:hover { text-decoration: underline; }
      .web-source-num {
        flex-shrink: 0;
        font-size: 11px;
        color: var(--label4);
      }

      /* ── Responsive ── */
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .page { padding: 16px; }
        .appbar-inner { padding: 0 16px; }
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="appbar-inner">
        <h1 class="appbar-title">AI Sandbox RAG</h1>
        <div class="status-chip" id="status">로딩 중</div>
      </div>
    </header>

    <main class="page">
      <div class="grid">
        <section>
          <div class="card composer">
            <div class="section-label">프로젝트</div>
            <div class="chips" id="chips"></div>
            <div class="textarea-wrap">
              <textarea id="query" placeholder="PDF 자료에 대해 질문하세요" rows="4"></textarea>
            </div>
            <div class="actions">
              <button class="btn btn-secondary" id="reindex">재색인</button>
              <label class="web-search-label" id="webSearchLabel">
                <input type="checkbox" id="webSearch"> 🌐 웹 검색
              </label>
              <button class="btn btn-primary" id="ask">질문하기</button>
            </div>
          </div>
          <div class="card file-card">
            <div class="section-label">파일</div>
            <div class="file-toolbar">
              <input class="input" id="dataRoot" placeholder="/sandbox/data" />
              <button class="btn btn-secondary" id="updateRoot">루트 변경</button>
            </div>
            <div class="file-toolbar">
              <input class="input" id="newProjectName" placeholder="새 프로젝트 이름" />
              <button class="btn btn-secondary" id="createProject">프로젝트 생성</button>
            </div>
            <div class="file-path">
              <button class="file-up" id="folderUp">상위</button>
              <span id="filePath">/</span>
            </div>
            <div class="file-list" id="fileList">
              <div class="file-empty">프로젝트를 선택하세요.</div>
            </div>
            <div class="file-actions">
              <input class="input" id="newFolderName" placeholder="새 폴더 이름" />
              <button class="btn btn-secondary" id="createFolder">폴더 생성</button>
            </div>
            <div class="file-actions">
              <input class="input" id="uploadFiles" type="file" multiple />
              <button class="btn btn-secondary" id="uploadBtn">업로드</button>
            </div>
          </div>
          <div class="card" style="margin-top: 16px;">
            <div class="answer-wrap" id="answer">
              <span class="answer-placeholder">답변이 여기에 표시됩니다.</span>
            </div>
          </div>
        </section>
        <aside class="card">
          <div class="sidebar-head">검색 근거</div>
          <div class="sidebar-divider"></div>
          <div class="context-list" id="contexts">
            <div class="ctx-empty">아직 검색 결과가 없습니다.</div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      const statusEl = document.querySelector("#status");
      const queryEl = document.querySelector("#query");
      const chipsEl = document.querySelector("#chips");
      const answerEl = document.querySelector("#answer");
      const contextsEl = document.querySelector("#contexts");
      const askBtn = document.querySelector("#ask");
      const reindexBtn = document.querySelector("#reindex");
      const webSearchEl = document.querySelector("#webSearch");
      const webSearchLabel = document.querySelector("#webSearchLabel");
      const fileListEl = document.querySelector("#fileList");
      const filePathEl = document.querySelector("#filePath");
      const folderUpBtn = document.querySelector("#folderUp");
      const dataRootEl = document.querySelector("#dataRoot");
      const updateRootBtn = document.querySelector("#updateRoot");
      const newProjectNameEl = document.querySelector("#newProjectName");
      const createProjectBtn = document.querySelector("#createProject");
      const newFolderNameEl = document.querySelector("#newFolderName");
      const createFolderBtn = document.querySelector("#createFolder");
      const uploadFilesEl = document.querySelector("#uploadFiles");
      const uploadBtn = document.querySelector("#uploadBtn");
      webSearchEl.addEventListener("change", () => {
        webSearchLabel.classList.toggle("active", webSearchEl.checked);
      });

      let currentProject = "";
      let currentPath = "";
      let activeAskController = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setProject(name) {
        currentProject = name;
        currentPath = "";
        chipsEl.querySelectorAll(".chip").forEach((c) => {
          c.classList.toggle("active", c.dataset.project === name);
        });
        refreshStatus();
        refreshFiles();
      }

      async function refreshStatus() {
        const project = currentProject || "";
        try {
          const res = await fetch(`/api/status?project=${encodeURIComponent(project)}`);
          const data = await res.json();
          if (data.data_root) dataRootEl.value = data.data_root;
          if (data.projects) {
            const prev = Array.from(chipsEl.querySelectorAll(".chip")).map((c) => c.dataset.project).join(",");
            const next = data.projects.join(",");
            if (prev !== next) {
              chipsEl.innerHTML = data.projects
                .map(
                  (name) =>
                    `<button class="chip${name === data.project ? " active" : ""}" data-project="${name}">${name}</button>`
                )
                .join("");
              chipsEl.querySelectorAll(".chip").forEach((c) => {
                c.addEventListener("click", () => setProject(c.dataset.project));
              });
            } else {
              chipsEl.querySelectorAll(".chip").forEach((c) => {
                c.classList.toggle("active", c.dataset.project === data.project);
              });
            }
            if (!data.project) {
              currentProject = "";
              currentPath = "";
              refreshFiles();
            } else if (!currentProject) {
              currentProject = data.project;
              currentPath = "";
              refreshFiles();
            }
          }
          statusEl.textContent = data.project
            ? `${data.project} · ${data.points_count} chunks`
            : "프로젝트 없음";
        } catch {
          statusEl.textContent = "unavailable";
        }
      }

      function formatBytes(size) {
        if (size < 1024) return `${size} B`;
        if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
        return `${(size / 1024 / 1024).toFixed(1)} MB`;
      }

      function parentPath(path) {
        const parts = path.split("/").filter(Boolean);
        parts.pop();
        return parts.join("/");
      }

      async function refreshFiles() {
        if (!currentProject) {
          filePathEl.textContent = "/";
          fileListEl.innerHTML = '<div class="file-empty">프로젝트를 선택하세요.</div>';
          return;
        }
        filePathEl.textContent = `/${currentProject}${currentPath ? "/" + currentPath : ""}`;
        folderUpBtn.disabled = !currentPath;
        try {
          const res = await fetch(`/api/files?project=${encodeURIComponent(currentProject)}&path=${encodeURIComponent(currentPath)}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          if (!data.items.length) {
            fileListEl.innerHTML = '<div class="file-empty">비어 있는 폴더입니다.</div>';
            return;
          }
          fileListEl.innerHTML = data.items.map((item) => {
            const icon = item.type === "directory" ? "📁" : "📄";
            const meta = item.type === "directory" ? "폴더" : formatBytes(item.size);
            const cls = `file-row${item.supported ? "" : " unsupported"}`;
            const name = escapeHtml(item.name);
            const path = escapeHtml(item.path);
            if (item.type === "directory") {
              return `<div class="${cls}">
                <span>${icon}</span>
                <button data-path="${path}" class="folder-link">${name}</button>
                <span class="file-meta">${meta}</span>
              </div>`;
            }
            return `<div class="${cls}">
              <span>${icon}</span>
              <span title="${name}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
              <span class="file-meta">${meta}</span>
            </div>`;
          }).join("");
          fileListEl.querySelectorAll(".folder-link").forEach((btn) => {
            btn.addEventListener("click", () => {
              currentPath = btn.dataset.path || "";
              refreshFiles();
            });
          });
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty error">${escapeHtml(err.message)}</div>`;
        }
      }

      async function createProject() {
        const name = newProjectNameEl.value.trim();
        if (!name) return;
        createProjectBtn.disabled = true;
        try {
          const res = await fetch("/api/projects", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          newProjectNameEl.value = "";
          currentProject = data.project;
          currentPath = "";
          await refreshStatus();
          await refreshFiles();
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty error">${escapeHtml(err.message)}</div>`;
        } finally {
          createProjectBtn.disabled = false;
        }
      }

      async function updateRoot() {
        const path = dataRootEl.value.trim();
        if (!path) return;
        updateRootBtn.disabled = true;
        try {
          const res = await fetch("/api/settings/data-root", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          dataRootEl.value = data.data_root;
          currentProject = "";
          currentPath = "";
          await refreshStatus();
          await refreshFiles();
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty error">${escapeHtml(err.message)}</div>`;
        } finally {
          updateRootBtn.disabled = false;
        }
      }

      async function createFolder() {
        const name = newFolderNameEl.value.trim();
        if (!name || !currentProject) return;
        createFolderBtn.disabled = true;
        try {
          const res = await fetch("/api/files/folder", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project: currentProject, path: currentPath, name }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          newFolderNameEl.value = "";
          await refreshFiles();
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty error">${escapeHtml(err.message)}</div>`;
        } finally {
          createFolderBtn.disabled = false;
        }
      }

      async function uploadFiles() {
        if (!currentProject || !uploadFilesEl.files.length) return;
        uploadBtn.disabled = true;
        const body = new FormData();
        body.append("project", currentProject);
        body.append("path", currentPath);
        for (const file of uploadFilesEl.files) body.append("files", file);
        try {
          const res = await fetch("/api/files/upload", { method: "POST", body });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          uploadFilesEl.value = "";
          await refreshFiles();
        } catch (err) {
          fileListEl.innerHTML = `<div class="file-empty error">${escapeHtml(err.message)}</div>`;
        } finally {
          uploadBtn.disabled = false;
        }
      }

      function renderWebSources(sources, answerWrap) {
        const existing = answerWrap.querySelector(".web-sources");
        if (existing) existing.remove();
        if (!sources.length) return;
        const el = document.createElement("div");
        el.className = "web-sources";
        el.innerHTML = `<div class="web-sources-label">🌐 웹 검색 출처</div>` +
          sources.map((s, i) =>
            `<div class="web-source"><span class="web-source-num">[W${i + 1}]</span><a href="${s.uri}" target="_blank" rel="noopener">${s.title || s.uri}</a></div>`
          ).join("");
        answerWrap.querySelector("div")?.appendChild(el);
      }

      function renderContexts(contexts) {
        if (!contexts.length) {
          contextsEl.innerHTML = '<div class="ctx-empty">검색 근거가 없습니다.</div>';
          return;
        }
        contextsEl.innerHTML = contexts
          .map(
            (item) => `
          <div class="ctx-item">
            <span class="ctx-badge">[${item.id}] ${item.score.toFixed(4)}</span>
            <div class="ctx-source">${item.source} · ${item.locator || "page " + item.page}</div>
            <div class="ctx-text">${item.text.slice(0, 260)}</div>
          </div>
        `
          )
          .join("");
      }

      // ── Cache helpers ────────────────────────────────────────────
      const CACHE_KEY_PREFIX = "rag_cache_v2";
      const CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000; // 7일

      function cacheKey(project, query, webSearch) {
        return `${CACHE_KEY_PREFIX}:${project}:${webSearch ? "web" : "local"}:${query.trim().toLowerCase()}`;
      }

      function cacheGet(project, query, webSearch) {
        try {
          const raw = localStorage.getItem(cacheKey(project, query, webSearch));
          if (!raw) return null;
          const entry = JSON.parse(raw);
          if (Date.now() - entry.ts > CACHE_MAX_AGE_MS) {
            localStorage.removeItem(cacheKey(project, query, webSearch));
            return null;
          }
          return entry;
        } catch { return null; }
      }

      function cacheSet(project, query, webSearch, answer, contexts, webSources) {
        try {
          localStorage.setItem(cacheKey(project, query, webSearch), JSON.stringify({
            answer, contexts, webSources, ts: Date.now(), query: query.trim(),
          }));
        } catch { /* storage full 무시 */ }
      }

      function fmtTs(ts) {
        const d = new Date(ts);
        return d.toLocaleDateString("ko-KR") + " " +
          d.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      }

      function showCachedAnswer(entry, query) {
        const answerWrap = document.querySelector(".answer-wrap");
        answerWrap.innerHTML =
          `<div class="cache-banner">
            <strong>캐시된 답변</strong>
            <span>${fmtTs(entry.ts)}</span>
            <button class="cache-refresh" data-query="${encodeURIComponent(query)}">다시 질문하기</button>
          </div>
          <div class="answer-wrap-inner" style="padding:20px">
            <div class="answer">${marked.parse(entry.answer)}</div>
          </div>`;
        answerWrap.querySelector(".cache-refresh").addEventListener("click", (e) => {
          ask(true);
        });
        renderContexts(entry.contexts || []);
        renderWebSources(entry.webSources || [], answerWrap);
      }
      // ─────────────────────────────────────────────────────────────

      async function ask(forceRefresh = false) {
        if (askBtn.disabled) return;
        const query = queryEl.value.trim();
        if (!query) return;
        const useWebSearch = webSearchEl.checked;

        if (!forceRefresh) {
          const cached = cacheGet(currentProject, query, useWebSearch);
          if (cached) {
            showCachedAnswer(cached, query);
            return;
          }
        }

        askBtn.disabled = true;
        activeAskController = new AbortController();
        const answerWrap = document.querySelector(".answer-wrap");
        answerWrap.innerHTML = '<span class="answer-placeholder">답변 생성 중...</span>';
        contextsEl.innerHTML = '<div class="ctx-empty">검색 중...</div>';
        let fullText = "";
        let lastContexts = [];
        let lastWebSources = [];
        try {
          const res = await fetch("/api/ask/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, project: currentProject, limit: 12, show_context: true, web_search: useWebSearch }),
            signal: activeAskController.signal,
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.detail || "request failed");
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              let data;
              try {
                data = JSON.parse(line.slice(6));
              } catch {
                continue;
              }
              if (data.type === "contexts") {
                lastContexts = data.contexts || [];
                renderContexts(lastContexts);
              } else if (data.type === "cache") {
                answerWrap.innerHTML = '<span class="answer-placeholder">캐시된 답변을 불러오는 중...</span>';
              } else if (data.type === "token") {
                fullText += data.text;
                answerWrap.innerHTML = '<div style="padding:20px"><div class="answer">' + marked.parse(fullText) + "</div></div>";
              } else if (data.type === "web_sources") {
                lastWebSources = data.sources || [];
                renderWebSources(lastWebSources, answerWrap);
              } else if (data.type === "error") {
                throw new Error(data.detail);
              }
            }
          }
          if (fullText) cacheSet(currentProject, query, useWebSearch, fullText, lastContexts, lastWebSources);
        } catch (err) {
          if (err.name === "AbortError") return;
          answerWrap.innerHTML = `<span class="answer-placeholder error" style="padding:20px;display:block">${err.message}</span>`;
          contextsEl.innerHTML = '<div class="ctx-empty">오류로 검색 근거를 표시하지 못했습니다.</div>';
        } finally {
          askBtn.disabled = false;
          activeAskController = null;
        }
      }

      function renderReindexProgress(job) {
        const total = job.total_files || 0;
        const done = job.files_done || 0;
        const failed = job.files_failed || 0;
        const skipped = job.files_skipped || 0;
        const finished = done + failed + skipped;
        const pct = total > 0 ? Math.round((finished / total) * 100) : 0;
        const isRunning = job.status === "running";
        const hasError = failed > 0;

        let headerText = "";
        if (job.no_changes) {
          headerText = "변경된 파일 없음";
        } else if (job.no_files) {
          headerText = "인덱싱할 파일 없음";
        } else if (isRunning) {
          headerText = total > 0
            ? `재색인 중 ${finished}/${total}`
            : "재색인 준비 중...";
        } else if (job.ok) {
          headerText = hasError
            ? `재색인 완료 (오류 ${failed}건)`
            : "재색인 완료";
        } else {
          headerText = "재색인 실패";
        }

        let subText = "";
        if (!isRunning && !job.no_changes && !job.no_files) {
          const parts = [];
          if (done > 0) parts.push(`${done}개 파일`);
          if (job.total_chunks > 0) parts.push(`${job.total_chunks.toLocaleString()} 청크`);
          if (job.files_deleted > 0) parts.push(`${job.files_deleted}개 삭제`);
          subText = parts.join(" · ");
        } else if (isRunning && job.current_file) {
          subText = job.current_file;
        }

        const files = job.files || [];
        const filesHtml = files.map((f) => {
          const icon =
            f.status === "done" ? "✓" :
            f.status === "error" ? "✗" :
            f.status === "skipped" ? "—" :
            f.status === "indexing" ? "⏳" : "○";
          const nameClass =
            f.status === "indexing" ? "rfile-name active" :
            f.status === "done" ? "rfile-name done" :
            "rfile-name";
          const badge = f.status === "done" && f.chunks != null
            ? `<span class="rfile-badge">${f.chunks.toLocaleString()} 청크</span>`
            : "";
          const errorLine = f.error
            ? `<div class="rfile-error">${f.error}</div>`
            : "";
          return `<div class="rfile">
            <span class="rfile-icon">${icon}</span>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:baseline">
                <span class="${nameClass}">${f.filename}</span>${badge}
              </div>${errorLine}
            </div>
          </div>`;
        }).join("");

        const fillClass = `progress-fill${hasError ? " error" : ""}`;

        return `<div class="reindex-box">
          <div class="reindex-header">
            <span>${headerText}</span>
            ${total > 0 && !job.no_changes ? `<span class="reindex-sub">${pct}%</span>` : ""}
          </div>
          ${total > 0 && !job.no_changes ? `
            <div class="progress-track">
              <div class="${fillClass}" style="width:${pct}%"></div>
            </div>` : ""}
          ${files.length > 0 ? `<div class="reindex-files">${filesHtml}</div>` : ""}
        </div>`;
      }

      async function reindex() {
        reindexBtn.disabled = true;
        answerEl.innerHTML = '<span class="answer-placeholder">재색인 시작 중...</span>';
        try {
          const res = await fetch("/api/reindex", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project: currentProject, recreate: false }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "request failed");
          const jobId = data.job_id;
          while (true) {
            const statusRes = await fetch(`/api/reindex/status/${jobId}`);
            const job = await statusRes.json();
            answerEl.innerHTML = renderReindexProgress(job);
            if (job.status !== "running") {
              await refreshStatus();
              break;
            }
            await new Promise((r) => setTimeout(r, 800));
          }
        } catch (err) {
          answerEl.innerHTML = `<span class="error">${err.message}</span>`;
        } finally {
          reindexBtn.disabled = false;
        }
      }

      queryEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          ask();
        }
      });
      askBtn.addEventListener("click", ask);
      reindexBtn.addEventListener("click", reindex);
      updateRootBtn.addEventListener("click", updateRoot);
      folderUpBtn.addEventListener("click", () => {
        currentPath = parentPath(currentPath);
        refreshFiles();
      });
      createProjectBtn.addEventListener("click", createProject);
      createFolderBtn.addEventListener("click", createFolder);
      uploadBtn.addEventListener("click", uploadFiles);
      refreshStatus().catch(() => {
        statusEl.textContent = "unavailable";
      });
    </script>
  </body>
</html>
