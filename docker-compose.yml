services:
  app:
    container_name: 88motorcycle-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
      - "${RAG_DATA_ROOT_HOST:-/Volumes/SSD T7/AI/data}:/rag-data:rw"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/88motorcycle
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY2=${GEMINI_API_KEY2}
      - GEMINI_API_KEY3=${GEMINI_API_KEY3}
      - GEMINI_API_KEY4=${GEMINI_API_KEY4}
      - GEMINI_API_KEY5=${GEMINI_API_KEY5}
      - GEMINI_API_KEY6=${GEMINI_API_KEY6}
      - GEMINI_API_KEY7=${GEMINI_API_KEY7}
      - GEMINI_API_KEY8=${GEMINI_API_KEY8}
      - GEMINI_API_KEY9=${GEMINI_API_KEY9}
      - SERVICE_API_KEY=${SERVICE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - RAG_DATA_ROOT=/rag-data
      - RAG_DATA_ROOT_HOST=${RAG_DATA_ROOT_HOST:-/Volumes/SSD T7/AI/data}
      - RAG_SERVICE_URL=http://rag-web:8088
      - RAG_DEFAULT_PROJECT=${RAG_DEFAULT_PROJECT:-inbox}
      - AI_RAG_API_KEY_GEMINI=${AI_RAG_API_KEY_GEMINI:-}
    depends_on:
      - db
      - rag-web
    networks:
      - app-network

  db:
    container_name: 88motorcycle-db
    image: ankane/pgvector:latest
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=88motorcycle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: 88motorcycle-pgadmin
    image: dpage/pgadmin4
    profiles:
      - tools
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network

  qdrant:
    container_name: 88motorcycle-rag-qdrant
    image: qdrant/qdrant:v1.15.5
    restart: always
    volumes:
      - rag_qdrant_data:/qdrant/storage
    networks:
      - app-network

  rag-web:
    container_name: 88motorcycle-rag-web
    build:
      context: ./rag-service
      dockerfile: Dockerfile.rag
    restart: always
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=${COLLECTION_NAME:-inbox_docs}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - AI_RAG_API_KEY_GEMINI=${AI_RAG_API_KEY_GEMINI:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ENABLE_ANSWER_CACHE=${ENABLE_ANSWER_CACHE:-1}
      - ANSWER_CACHE_TTL_SECONDS=${ANSWER_CACHE_TTL_SECONDS:-604800}
      - CHUNK_SIZE=${CHUNK_SIZE:-1400}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - MIN_CHUNK_CHARS=${MIN_CHUNK_CHARS:-80}
      - INDEX_BATCH_SIZE=${INDEX_BATCH_SIZE:-128}
      - ENABLE_OCR=${ENABLE_OCR:-1}
      - OCR_LANG=${OCR_LANG:-kor+eng}
      - OCR_MIN_TEXT_CHARS=${OCR_MIN_TEXT_CHARS:-1}
      - ENABLE_STT=${ENABLE_STT:-1}
      - STT_ENABLE_KOSPACING=${STT_ENABLE_KOSPACING:-1}
      - STT_MODELS=${STT_MODELS:-}
      - STT_MODEL=${STT_MODEL:-small}
      - STT_DEVICE=${STT_DEVICE:-cpu}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_LANGUAGE=${STT_LANGUAGE:-ko}
      - STT_CHUNK_SECONDS=${STT_CHUNK_SECONDS:-180}
      - STT_BEAM_SIZE=${STT_BEAM_SIZE:-10}
      - STT_TEMPERATURE=${STT_TEMPERATURE:-0.0}
      - STT_COMPRESSION_RATIO_THRESHOLD=${STT_COMPRESSION_RATIO_THRESHOLD:-2.2}
      - STT_INITIAL_PROMPT=${STT_INITIAL_PROMPT:-다음은 한국어 음성입니다.}
      - STT_MIN_VOTES=${STT_MIN_VOTES:-2}
      - STT_MIN_AVG_LOGPROB=${STT_MIN_AVG_LOGPROB:--0.8}
      - STT_MAX_NO_SPEECH_PROB=${STT_MAX_NO_SPEECH_PROB:-0.3}
      - STT_ALIGN_TOLERANCE=${STT_ALIGN_TOLERANCE:-0.5}
      - STT_SIMILARITY_THRESHOLD=${STT_SIMILARITY_THRESHOLD:-0.6}
      - PROJECT_NAME=${RAG_DEFAULT_PROJECT:-inbox}
      - DATA_ROOT=/sandbox/data
    volumes:
      - "${RAG_DATA_ROOT_HOST:-/Volumes/SSD T7/AI/data}:/sandbox/data:rw"
      - ./rag-service/config:/sandbox/config:ro
      - rag_cache:/sandbox/cache
      - rag_workspace:/sandbox/workspace
      - ./rag-service/scripts:/sandbox/scripts:ro
    working_dir: /sandbox
    depends_on:
      - qdrant
    command: ["uvicorn", "web:app", "--app-dir", "/sandbox/scripts", "--host", "0.0.0.0", "--port", "8088"]
    networks:
      - app-network

  rag-watcher:
    container_name: 88motorcycle-rag-watcher
    build:
      context: ./rag-service
      dockerfile: Dockerfile.rag
    restart: always
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=${COLLECTION_NAME:-inbox_docs}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - CHUNK_SIZE=${CHUNK_SIZE:-1400}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - MIN_CHUNK_CHARS=${MIN_CHUNK_CHARS:-80}
      - INDEX_BATCH_SIZE=${INDEX_BATCH_SIZE:-128}
      - ENABLE_OCR=${ENABLE_OCR:-1}
      - OCR_LANG=${OCR_LANG:-kor+eng}
      - OCR_MIN_TEXT_CHARS=${OCR_MIN_TEXT_CHARS:-1}
      - ENABLE_STT=${ENABLE_STT:-1}
      - STT_ENABLE_KOSPACING=${STT_ENABLE_KOSPACING:-1}
      - STT_MODELS=${STT_MODELS:-}
      - STT_MODEL=${STT_MODEL:-small}
      - STT_DEVICE=${STT_DEVICE:-cpu}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_LANGUAGE=${STT_LANGUAGE:-ko}
      - STT_CHUNK_SECONDS=${STT_CHUNK_SECONDS:-180}
      - STT_BEAM_SIZE=${STT_BEAM_SIZE:-10}
      - STT_TEMPERATURE=${STT_TEMPERATURE:-0.0}
      - STT_COMPRESSION_RATIO_THRESHOLD=${STT_COMPRESSION_RATIO_THRESHOLD:-2.2}
      - STT_INITIAL_PROMPT=${STT_INITIAL_PROMPT:-다음은 한국어 음성입니다.}
      - STT_MIN_VOTES=${STT_MIN_VOTES:-2}
      - STT_MIN_AVG_LOGPROB=${STT_MIN_AVG_LOGPROB:--0.8}
      - STT_MAX_NO_SPEECH_PROB=${STT_MAX_NO_SPEECH_PROB:-0.3}
      - STT_ALIGN_TOLERANCE=${STT_ALIGN_TOLERANCE:-0.5}
      - STT_SIMILARITY_THRESHOLD=${STT_SIMILARITY_THRESHOLD:-0.6}
      - PROJECT_NAME=*
      - DATA_ROOT=/sandbox/data
      - WATCH_INTERVAL_SECONDS=${WATCH_INTERVAL_SECONDS:-120}
    volumes:
      - "${RAG_DATA_ROOT_HOST:-/Volumes/SSD T7/AI/data}:/sandbox/data:ro"
      - ./rag-service/config:/sandbox/config:ro
      - rag_cache:/sandbox/cache
      - rag_workspace:/sandbox/workspace
      - ./rag-service/scripts:/sandbox/scripts:ro
    working_dir: /sandbox
    depends_on:
      - qdrant
    command: ["python", "/sandbox/scripts/watcher.py"]
    networks:
      - app-network

  openclaw:
    container_name: 88motorcycle-openclaw
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/88motorcycle
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY2=${GEMINI_API_KEY2}
      - GEMINI_API_KEY3=${GEMINI_API_KEY3}
      - GEMINI_API_KEY4=${GEMINI_API_KEY4}
      - GEMINI_API_KEY5=${GEMINI_API_KEY5}
      - GEMINI_API_KEY6=${GEMINI_API_KEY6}
      - GEMINI_API_KEY7=${GEMINI_API_KEY7}
      - GEMINI_API_KEY8=${GEMINI_API_KEY8}
      - GEMINI_API_KEY9=${GEMINI_API_KEY9}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - APP_INTERNAL_URL=http://app:3000
      - SERVICE_API_KEY=${SERVICE_API_KEY:-}
    depends_on:
      - db
      - app
    volumes:
      - ./data/archive:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  rag_qdrant_data:
  rag_cache:
  rag_workspace:
